version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: d1mcr_mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: dale1mano_db
      MYSQL_ROOT_PASSWORD: root_password_2026
    ports:
      - "3307:3306"
    volumes:
      - ./BD/TABLAS_BD.sql:/docker-entrypoint-initdb.d/01_TABLAS_BD.sql
      - ./BD/sps.sql:/docker-entrypoint-initdb.d/02_sps.sql
      - ./BD/EVENTS.sql:/docker-entrypoint-initdb.d/03_EVENTS.sql

  backend:
    build: ./backend
    container_name: d1mcr_flask_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root_password_2026
      - DB_NAME=dale1mano_db
    depends_on:
      - db