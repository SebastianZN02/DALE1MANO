version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: d1mcr_mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: d1mcr_db
      MYSQL_ROOT_PASSWORD: root_password_2026
    ports:
      - "3306:3306"
    volumes:
      - ./BD:/docker-entrypoint-initdb.d

  backend:
    build: ./backend
    container_name: d1mcr_flask_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root_password_2026
      - DB_NAME=d1mcr_db
    depends_on:
      - db